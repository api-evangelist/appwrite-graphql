apis:
  - aid: appwrite-graphql:graphql-api
    name: Appwrite GraphQL GraphQL API
    description: |
      The Appwrite GraphQL API provides a unified GraphQL endpoint at /v1/graphql that exposes
      all Appwrite platform resources including databases, users, storage buckets, and cloud
      functions. It supports selection sets for targeted field retrieval, query batching for
      multiple operations in a single request, and file uploads via multipart/form-data.
    tags:
