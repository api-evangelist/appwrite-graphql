aid: appwrite-graphql
name: Appwrite GraphQL
description: |
  Appwrite GraphQL is a powerful API layer that exposes the full Appwrite backend-as-a-service
  platform through a GraphQL interface, allowing developers to query and mutate any resource
  type including databases, storage, users, and functions. It mirrors the complete Appwrite
  REST API (except OAuth) with GraphQL advantages such as selection sets and query batching,
  enabling precise data fetching and multiple operations in a single request.
type: Index
